site_name: 课狐 ClassFox 文档中心
site_description: 课狐 ClassFox 项目文档，涵盖项目介绍、环境准备、架构设计、开发流程与普通用户使用说明。
site_url: https://ouyangyipeng.github.io/ClassAssistant/
repo_url: https://github.com/ouyangyipeng/ClassAssistant
repo_name: ouyangyipeng/ClassAssistant

theme:
  name: material
  custom_dir: docs/overrides
  language: zh
  logo: img/logo透明背景.png
  favicon: img/logo.png
  icon:
    repo: fontawesome/brands/github
  font: false
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.prune
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.select
    - content.tabs.link

plugins:
  - search
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      type: iso_datetime

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ouyangyipeng/ClassAssistant
  generator: false
  comments:
    enabled: true
    repo: ouyangyipeng/ClassAssistant
    repo_id: R_kgDORfBNUQ
    category: General
    category_id: DIC_kwDORfBNUc4C30oY
    mapping: pathname
    strict: '1'
    reactions_enabled: '1'
    input_position: bottom
    lang: zh-CN

extra_css:
  - stylesheets/fonts.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/giscus.js

nav:
  - 首页: index.md
  - 项目全景:
      - 概览入口: project/index.md
      - 项目介绍: project/introduction.md
      - 系统架构: project/architecture.md
      - 代码模块说明: project/modules.md
      - 数据与配置: project/data-and-config.md
  - 使用指南:
      - 使用入口: user-guide/index.md
      - 环境准备: getting-started/environment.md
      - 首次使用: user-guide/quickstart.md
      - 功能工作流: user-guide/features.md
      - 常见问题: user-guide/faq.md
  - 开发维护:
      - 开发入口: developer/index.md
      - 开发运行: getting-started/development.md
      - 打包发布: getting-started/packaging.md
      - 接口与联调: developer/api-reference.md
      - 排错手册: developer/troubleshooting.md
      - 附录资料:
          - 历史开发说明: 开发指南.md
          - Fun-ASR 资料: Fun-asr-python-sdk.md
          - Seed-ASR 协议: seed-asr-api.md

copyright: Copyright © 2026 ouyangyipeng